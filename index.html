firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const DOC = db.collection("school").doc("data");

// Прочитати дані
async function fbLoad() {
  try {
    const snap = await DOC.get();
    return snap.exists ? snap.data() : null;
  } catch(e) {
    console.error("Firebase read error:", e);
    return null;
  }
}

// Зберегти дані — з перевіркою та захистом від порожнього запису
async function fbSave(data) {
  try {
    // Захист: ніколи не зберігаємо якщо основні масиви відсутні
    if (!data || typeof data !== 'object') {
      console.error("fbSave: invalid data, skipping");
      return false;
    }
    // Переконуємось що всі поля є масивами
    const safe = {
      students: Array.isArray(data.students) ? data.students : [],
      lessons:  Array.isArray(data.lessons)  ? data.lessons  : [],
      payments: Array.isArray(data.payments) ? data.payments : [],
      requests: Array.isArray(data.requests) ? data.requests : [],
      teacherChatId: data.teacherChatId || "",
    };
    await DOC.set(safe);
    return true;
  } catch(e) {
    console.error("Firebase write error:", e);
    return false;
  }
}

// Слухати зміни в реальному часі
function fbListen(callback) {
  return DOC.onSnapshot(snap => {
    if (snap.exists) {
      const d = snap.data();
      // Перевіряємо що дані валідні перед оновленням стану
      if (d && typeof d === 'object') {
        callback(d);
      }
    }
  }, err => console.error("Firebase listen error:", err));
}
</script>

const MiniCal=({lessons,onDay,sel})=>{
  const now=new Date();
  const[yr,setYr]=useState(now.getFullYear());
  const[mo,setMo]=useState(now.getMonth());
  const t=today();
  const dim=new Date(yr,mo+1,0).getDate();
  const fd=(()=>{const d=new Date(yr,mo,1).getDay();return d===0?6:d-1;})();
  const mk=(d)=>`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const lFor=(ds)=>lessons.filter(l=>l.date===ds);
  const prev=()=>{if(mo===0){setYr(y=>y-1);setMo(11);}else setMo(m=>m-1);};
  const next=()=>{if(mo===11){setYr(y=>y+1);setMo(0);}else setMo(m=>m+1);};
  return(
    <div className="card" style={{margin:"0 16px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px 18px 10px"}}>
        <button onClick={prev} style={{background:iOS.fill3,border:"none",width:30,height:30,borderRadius:8,cursor:"pointer",color:iOS.blue,fontSize:18,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <span style={{fontSize:16,fontWeight:700,color:iOS.label,letterSpacing:"-0.3px"}}>{MONTHS[mo]} {yr}</span>
        <button onClick={next} style={{background:iOS.fill3,border:"none",width:30,height:30,borderRadius:8,cursor:"pointer",color:iOS.blue,fontSize:18,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>

      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 10px 6px"}}>
        {WD.map(d=><div key={d} style={{textAlign:"center",fontSize:11,color:iOS.label3,fontWeight:600,letterSpacing:"0.02em",padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,padding:"0 8px 12px"}}>
        {Array(fd).fill(null).map((_,i)=><div key={"e"+i}/>)}
        {Array(dim).fill(null).map((_,i)=>{
          const day=i+1,ds=mk(day);
          const dl=lFor(ds).filter(l=>l.status!=="cancelled");
          const isT=ds===t,isSel=ds===sel;
          const dotColor=(l)=>({planned:iOS.orange,completed:iOS.green}[l.status]||iOS.orange);
          const shownDots=dl.slice(0,5);
          return(
            <div key={day} onClick={()=>onDay?.(ds)} style={{height:46,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",borderRadius:10,cursor:"pointer",gap:2,background:isSel?iOS.blue:isT?iOS.blueT:"transparent",transition:"background 0.15s"}}>

              {dl.length>0&&<div style={{display:"flex",gap:2,flexWrap:"wrap",justifyContent:"center",maxWidth:28}}>
                {shownDots.map((l,i)=><div key={i} style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.8)":dotColor(l)}}/>)}
                {dl.length>5&&<div style={{width:4,height:4,borderRadius:"50%",background:isSel?"rgba(255,255,255,0.5)":iOS.label3}}/>}
              </div>}
            </div>
          );
        })}
      </div>
      <div style={{display:"flex",gap:16,padding:"8px 18px 14px",borderTop:`0.5px solid ${iOS.sepNT}`}}>

const DAYS_UK=["Пн","Вт","Ср","Чт","Пт","Сб","Нд"];
const DAYS_FULL=["Понеділок","Вівторок","Середа","Четвер","П'ятниця","Субота","Неділя"];

// Понеділок поточного тижня
const weekMon=()=>{const d=new Date();const dow=d.getDay();const diff=dow===0?-6:1-dow;d.setDate(d.getDate()+diff);d.setHours(12,0,0,0);return d;};

// Генерація уроків за тижневим графіком
const generateLessonsByRange=(student,schedule,fromDate,toDate,existingLessons)=>{
  const newLessons=[];
  // Маппінг: наш slot.day (0=Пн..6=Нд) → JS getDay() (0=Нд,1=Пн..6=Сб)
  const slotDayToJsDay=[1,2,3,4,5,6,0];

  // Парсимо дати о 12:00 щоб уникнути зсуву UTC
  const from=new Date(fromDate+"T12:00:00");
  const to=new Date(toDate+"T12:00:00");
  to.setHours(23,59,59,0);

  // Перебираємо кожен день в діапазоні
  const cur=new Date(from);
  while(cur<=to){
    const jsDow=cur.getDay(); // поточний день тижня за JS (0=Нд)
    for(const slot of schedule){
      const targetJsDay=slotDayToJsDay[slot.day];
      if(jsDow===targetJsDay){
        const dateStr=localDateStr(cur);
        const exists=existingLessons.some(
          l=>l.studentId===student.id&&l.date===dateStr&&l.time===slot.time
        );
        if(!exists){
          newLessons.push({
            id:uid(),
            studentId:student.id,
            date:dateStr,
            time:slot.time,
            status:"planned",
            paid:false,
            amount:student.lessonCost,
          });
        }
      }
    }
    cur.setDate(cur.getDate()+1); // наступний день
  }
  return newLessons;
};

                            {l.status==="completed"&&<div style={{fontSize:9,color:iOS.green,fontWeight:600}}>✓</div>}
                          </div>
                        );
                      }
                      return(
                        <div key={i} onClick={()=>{setSel(ds);setLSheet("new");}}
                          style={{borderRadius:8,minHeight:36,background:isT?"rgba(0,122,255,0.03)":"rgba(118,118,128,0.05)",border:`1px dashed ${isT?"rgba(0,122,255,0.2)":"rgba(118,118,128,0.15)"}`,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <span style={{fontSize:16,color:"rgba(118,118,128,0.3)"}}>+</span>
                        </div>
                      );
                    })}

                );
              })}
            </div>
          </div>
          <div style={{padding:"12px 16px",fontSize:12,color:iOS.label3,textAlign:"center"}}>
            Натисніть на учня → перейдете до дня · Натисніть + → додасте урок
          </div>
        </div>
      )}

      <div style={{height:20}}/>
      {lSheet==="new"&&<LessonSheet students={active} isNew defaultDate={sel} onClose={()=>setLSheet(null)} onSave={d=>{onAdd(d);setLSheet(null);}} onDelete={()=>{}}/>}
      {lSheet&&lSheet!=="new"&&<LessonSheet lesson={lSheet} students={students} onClose={()=>setLSheet(null)} onSave={d=>{onUpdate(d);setLSheet(null);}} onDelete={id=>{onDelete(id);setLSheet(null);}}/>}
      {mSheet&&<MoveSheet lesson={mSheet} onClose={()=>setMSheet(null)} onMove={d=>{onUpdate(d);setMSheet(null);setSel(d.date);}}/>}
    </div>
  );
};

// ── PAYMENT LOGIC HELPERS ─────────────────────────────────

const recalcPaid=(studentId,lessons,payments,students)=>{
  const student=students.find(s=>s.id===studentId);
  if(!student)return lessons;
  const cost=student.lessonCost||1;
  const totalPaid=payments.filter(p=>p.studentId===studentId).reduce((s,p)=>s+p.amount,0);
  const paidCount=Math.floor(totalPaid/cost);
  const studentLessons=[...lessons]
    .filter(l=>l.studentId===studentId&&l.status!=="cancelled")
    .sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const paidIds=new Set(studentLessons.slice(0,paidCount).map(l=>l.id));
  return lessons.map(l=>{
    if(l.studentId!==studentId)return l;
    if(l.status==="cancelled")return{...l,paid:false};
    return{...l,paid:paidIds.has(l.id)};
  });
};

// ── SCHEDULE SECTION COMPONENT ───────────────────────────
const ScheduleSection=({student,allLessons,onSave,onUpdateSchedule})=>{
  const[schedule,setSchedule]=useState(student.schedule||[]);
  const[newDay,setNewDay]=useState("0");
  const[newTime,setNewTime]=useState("10:00");
  const[fromDate,setFromDate]=useState(today());
  const[toDate,setToDate]=useState(()=>{
    const d=new Date();d.setMonth(d.getMonth()+3);return localDateStr(d);
  });
  const[genBusy,setGenBusy]=useState(false);
  const[genResult,setGenResult]=useState(null);
  const[saved,setSaved]=useState(true);
  const DAYS=["Понеділок","Вівторок","Середа","Четвер","П'ятниця","Субота","Неділя"];
  const DAYS_SHORT=["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];

  useEffect(()=>{
    setSchedule(student.schedule||[]);
    setGenResult(null);
    setSaved(true);
  },[student.id]);

  // Перевірка конфлікту по КОНКРЕТНИХ ДАТАХ в обраному діапазоні
  // Генеруємо всі дати слоту в [fromDate..toDate] і шукаємо перетин з існуючими уроками
  const getConflictsForSlot=(day,time,from,to)=>{
    if(!allLessons||!from||!to)return[];
    const slotDayToJsDay=[1,2,3,4,5,6,0];
    const targetJsDay=slotDayToJsDay[Number(day)];
    const fromD=new Date(from+"T12:00:00");
    const toD=new Date(to+"T12:00:00");
    toD.setHours(23,59,59,0);
    // Всі дати слоту в діапазоні
    const slotDates=[];
    const cur=new Date(fromD);
    while(cur<=toD){
      if(cur.getDay()===targetJsDay)slotDates.push(localDateStr(cur));
      cur.setDate(cur.getDate()+1);
    }
    // Знаходимо конфлікти: інші учні що мають урок на ці конкретні дати і час
    const conflicts=[];
    slotDates.forEach(dateStr=>{
      const conflict=allLessons.find(l=>
        l.studentId!==student.id&&
        l.status!=="cancelled"&&
        l.date===dateStr&&
        l.time===time
      );
      if(conflict)conflicts.push({date:dateStr,lesson:conflict});
    });
    return conflicts;
  };

  // Конфлікти для поточного розкладу (лише якщо є діапазон)
  const slotConflicts=fromDate&&toDate
    ?schedule.map(s=>({
        slot:s,
        conflicts:getConflictsForSlot(s.day,s.time,fromDate,toDate)
      })).filter(x=>x.conflicts.length>0)
    :[];
  const hasConflicts=slotConflicts.length>0;

  // Конфлікт для нового слоту (превʼю)
  const newSlotConflicts=fromDate&&toDate
    ?getConflictsForSlot(newDay,newTime,fromDate,toDate)
    :[];

  const addSlot=()=>{
    const day=Number(newDay);
    if(schedule.some(s=>s.day===day&&s.time===newTime))return;
    setSchedule([...schedule,{day,time:newTime}]);
    setSaved("dirty");setGenResult(null);
  };
  const removeSlot=(day,time)=>{
    setSchedule(schedule.filter(s=>!(s.day===day&&s.time===time)));
    setSaved("dirty");setGenResult(null);
  };
  const saveSchedule=async()=>{
    if(hasConflicts)return;
    await onUpdateSchedule({...student,schedule});
    setSaved(true);setGenResult(null);
  };

  const scheduleChanged=saved==="dirty";
  const isSaved=saved===true;
  const canGenerate=isSaved&&schedule.length>0&&!hasConflicts&&fromDate&&toDate;

  return(
    <Section title="📅 Щотижневий графік">

      {/* КРОК 1: Спочатку вкажіть діапазон дат */}
      <div style={{padding:"14px 16px",borderBottom:"0.5px solid rgba(60,60,67,0.12)",background:"rgba(116,116,128,0.04)"}}>
        <div style={{fontSize:12,color:iOS.label2,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.04em"}}>Крок 1 — Вкажіть діапазон</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div>
            <div style={{fontSize:11,color:iOS.label3,marginBottom:4}}>Від</div>
            <input type="date" value={fromDate} onChange={e=>{setFromDate(e.target.value);setGenResult(null);}}
              style={{width:"100%",padding:"9px 10px",background:iOS.fill4,border:"1px solid rgba(60,60,67,0.12)",borderRadius:10,fontSize:14,color:iOS.label}}/>
          </div>
          <div>
            <div style={{fontSize:11,color:iOS.label3,marginBottom:4}}>До</div>
            <input type="date" value={toDate} onChange={e=>{setToDate(e.target.value);setGenResult(null);}}
              style={{width:"100%",padding:"9px 10px",background:iOS.fill4,border:"1px solid rgba(60,60,67,0.12)",borderRadius:10,fontSize:14,color:iOS.label}}/>
          </div>
        </div>
        {fromDate&&toDate&&<p style={{fontSize:11,color:iOS.label3,marginTop:6}}>Конфлікти перевіряються лише в цьому діапазоні</p>}
      </div>

      {/* КРОК 2: Слоти графіку */}
      <div style={{padding:"10px 16px 4px",borderBottom:"0.5px solid rgba(60,60,67,0.12)"}}>
        <div style={{fontSize:12,color:iOS.label2,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.04em"}}>Крок 2 — Дні і час занять</div>
      </div>

      {schedule.length===0&&(
        <div style={{padding:"10px 16px 14px",fontSize:14,color:iOS.label3}}>
          Додайте день і час нижче.
        </div>
      )}
      {[...schedule].sort((a,b)=>a.day-b.day||a.time.localeCompare(b.time)).map((s,i)=>{
        const sc=slotConflicts.find(x=>x.slot.day===s.day&&x.slot.time===s.time);
        const hasC=sc&&sc.conflicts.length>0;
        return(
          <div key={i} style={{
            display:"flex",justifyContent:"space-between",alignItems:"flex-start",
            padding:"12px 16px",borderBottom:"0.5px solid rgba(60,60,67,0.12)",
            background:hasC?"rgba(255,59,48,0.05)":"transparent",
            borderLeft:hasC?"3px solid #FF3B30":"none",
          }}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:hasC?4:0}}>
                <span style={{fontSize:15,fontWeight:600,color:hasC?iOS.red:iOS.label}}>{DAYS[s.day]}</span>
                <span style={{fontSize:15,fontWeight:700,color:hasC?iOS.red:iOS.blue}}>{s.time}</span>
              </div>
              {hasC&&sc.conflicts.map((c,ci)=>(
                <div key={ci} style={{fontSize:11,color:iOS.red,fontWeight:600,marginTop:2}}>
                  ⛔ {c.date} зайнято іншим учнем
                </div>
              ))}
            </div>
            <button onClick={()=>removeSlot(s.day,s.time)}
              style={{background:"rgba(255,59,48,0.1)",color:"#FF3B30",border:"none",borderRadius:8,padding:"5px 12px",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0,marginLeft:8}}>✕</button>
          </div>
        );
      })}

      {/* Додати слот */}
      <div style={{padding:"12px 16px",borderBottom:"0.5px solid rgba(60,60,67,0.12)"}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <select value={newDay} onChange={e=>setNewDay(e.target.value)}
            style={{flex:1,padding:"9px 10px",background:iOS.fill4,border:`1px solid ${newSlotConflicts.length?"#FF3B30":"rgba(60,60,67,0.12)"}`,borderRadius:10,fontSize:14,color:iOS.label,appearance:"none"}}>
            {DAYS.map((d,i)=><option key={i} value={i}>{d}</option>)}
          </select>
          <input type="time" value={newTime} onChange={e=>setNewTime(e.target.value)}
            style={{width:95,padding:"9px 10px",background:iOS.fill4,border:`1px solid ${newSlotConflicts.length?"#FF3B30":"rgba(60,60,67,0.12)"}`,borderRadius:10,fontSize:14,color:iOS.label}}/>
          <button onClick={addSlot}
            style={{background:"rgba(0,122,255,0.1)",color:"#007AFF",border:"none",borderRadius:10,padding:"9px 14px",fontSize:16,fontWeight:700,cursor:"pointer",flexShrink:0}}>+</button>
        </div>
        {newSlotConflicts.length>0&&(
          <div style={{marginTop:6,padding:"6px 10px",background:"rgba(255,59,48,0.08)",borderRadius:8}}>
            <p style={{fontSize:12,color:iOS.red,fontWeight:600,margin:"0 0 2px"}}>⛔ Конфлікт в обраному діапазоні:</p>
            {newSlotConflicts.slice(0,3).map((c,i)=>(
              <p key={i} style={{fontSize:11,color:iOS.red,margin:0}}>{c.date} — {DAYS_SHORT[new Date(c.date+"T12:00:00").getDay()]} зайнято</p>
            ))}
            {newSlotConflicts.length>3&&<p style={{fontSize:11,color:iOS.red,margin:0}}>...і ще {newSlotConflicts.length-3} дат</p>}
          </div>
        )}
      </div>

      {/* Зберегти */}
      <div style={{padding:"12px 16px",borderBottom:"0.5px solid rgba(60,60,67,0.12)"}}>
        <div style={{fontSize:12,color:iOS.label2,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.04em"}}>Крок 3 — Збережіть графік</div>
        {hasConflicts&&(
          <div style={{padding:"8px 12px",background:"rgba(255,59,48,0.08)",borderRadius:8,marginBottom:8,fontSize:13,color:iOS.red,fontWeight:600}}>
            ⛔ Є конфлікти — видаліть зайняті слоти
          </div>
        )}
        {scheduleChanged&&!hasConflicts&&(
          <div style={{padding:"8px 12px",background:"rgba(255,149,0,0.1)",borderRadius:8,marginBottom:8,fontSize:13,color:iOS.orange,fontWeight:600}}>
            ⚠ Є незбережені зміни
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <IBtn sm v="tinted" color={hasConflicts?iOS.label3:iOS.blue}
            disabled={hasConflicts||(!scheduleChanged&&isSaved)}
            onClick={saveSchedule}>Зберегти графік</IBtn>
          {isSaved&&!scheduleChanged&&<span style={{fontSize:13,color:iOS.green,fontWeight:600}}>✓ Збережено</span>}
        </div>
      </div>

      {/* Генерація */}
      {schedule.length>0&&(
        <div style={{padding:"12px 16px 16px"}}>
          <div style={{fontSize:12,color:iOS.label2,fontWeight:600,marginBottom:8,textTransform:"uppercase",letterSpacing:"0.04em"}}>Крок 4 — Згенерувати уроки</div>
          {!isSaved&&!hasConflicts&&(
            <div style={{padding:"10px 12px",background:"rgba(255,149,0,0.1)",borderRadius:10,fontSize:13,color:iOS.orange,fontWeight:600}}>
              ⚠ Спочатку збережіть графік!
            </div>
          )}
          {hasConflicts&&(
            <div style={{padding:"10px 12px",background:"rgba(255,59,48,0.08)",borderRadius:10,fontSize:13,color:iOS.red,fontWeight:600}}>
              ⛔ Усуньте конфлікти перед генерацією
            </div>
          )}
          {canGenerate&&(
            genResult===null?(
              <IBtn sm v="tinted" color={iOS.indigo} disabled={genBusy} onClick={async()=>{
                setGenBusy(true);
                const newL=generateLessonsByRange(student,schedule,fromDate,toDate,allLessons);
                if(newL.length>0)await onSave(newL);
                setGenResult(newL.length);
                setGenBusy(false);
              }}>{genBusy?"Генерація...":"📅 Згенерувати уроки"}</IBtn>
            ):(
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <p style={{fontSize:14,color:genResult>0?iOS.green:iOS.label2,fontWeight:600}}>
                  {genResult>0?`✓ Додано ${genResult} уроків!`:"Всі уроки вже існують"}
                </p>
                <button onClick={()=>setGenResult(null)} style={{background:iOS.fill3,border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,color:iOS.label2,cursor:"pointer"}}>Ще раз</button>
              </div>
            )
          )}
        </div>
      )}
    </Section>
  );
};

          );
        })}

    </div>
  );
};

// ── ФІНАНСИ ───────────────────────────────────────────────
const Finance=({students,lessons,payments,onAddPayment,onUpdatePayment,onDeletePayment})=>{
  const[paySheet,setPaySheet]=useState(false);
  const[editSheet,setEditSheet]=useState(null);
  const[vm,setVm]=useState(thisMo());
  const getSt=(id)=>students.find(s=>s.id===id);
  const chM=(d)=>{const[y,m]=vm.split("-").map(Number);let ny=y,nm=m+d;if(nm>12){ny++;nm=1;}if(nm<1){ny--;nm=12;}setVm(`${ny}-${String(nm).padStart(2,"0")}`);};
  const[vy,vm2]=vm.split("-").map(Number);
  const moL=lessons.filter(l=>l.date.startsWith(vm));
  const moP=payments.filter(p=>p.date.startsWith(vm));
  const planned=moL.filter(l=>l.status!=="cancelled").reduce((s,l)=>s+l.amount,0);
  const actual=moL.filter(l=>l.status==="completed").reduce((s,l)=>s+l.amount,0);
  const received=moP.reduce((s,p)=>s+p.amount,0);
  const perSt=students.map(s=>{
    const ml=moL.filter(l=>l.studentId===s.id);
    const mp=moP.filter(p=>p.studentId===s.id);
    // Загальний аванс/борг учня — з усіх платежів і всіх проведених уроків (не лише за місяць)
    const totalPaid=payments.filter(p=>p.studentId===s.id).reduce((a,p)=>a+p.amount,0);
    const totalEarned=lessons.filter(l=>l.studentId===s.id&&l.status==="completed").reduce((a,l)=>a+l.amount,0);
    const overallBalance=totalPaid-totalEarned; // >0 = аванс, <0 = борг
    return{
      s,
      done:ml.filter(l=>l.status==="completed").length,
      total:ml.filter(l=>l.status!=="cancelled").length,
      earned:ml.filter(l=>l.status==="completed").reduce((a,l)=>a+l.amount,0),
      paid:mp.reduce((a,p)=>a+p.amount,0),
      overallBalance, // загальний аванс/борг по всій історії
    };
  }).filter(x=>x.total>0||x.paid>0||Math.abs(x.overallBalance)>0);

  // Учні з авансом або боргом що НЕ з'являються у місячному perSt (перехідний залишок)
  const carryover=students.filter(s=>{
    const totalPaid=payments.filter(p=>p.studentId===s.id).reduce((a,p)=>a+p.amount,0);
    const totalEarned=lessons.filter(l=>l.studentId===s.id&&l.status==="completed").reduce((a,l)=>a+l.amount,0);
    const bal=totalPaid-totalEarned;
    // Показуємо якщо є залишок і учень не в місячному списку
    const inMonth=moL.some(l=>l.studentId===s.id)||moP.some(p=>p.studentId===s.id);
    return !inMonth&&Math.abs(bal)>1; // >1 щоб уникнути копійчаних розбіжностей
  }).map(s=>{
    const totalPaid=payments.filter(p=>p.studentId===s.id).reduce((a,p)=>a+p.amount,0);
    const totalEarned=lessons.filter(l=>l.studentId===s.id&&l.status==="completed").reduce((a,l)=>a+l.amount,0);
    return{s,overallBalance:totalPaid-totalEarned};
  });

  const PaySheet=()=>{
    const[sId,setSId]=useState(students[0]?.id||"");
    const[amt,setAmt]=useState("");
    const[date,setDate]=useState(today());
    const[note,setNote]=useState("");
    return(
      <Sheet title="Внести оплату" onClose={()=>setPaySheet(false)}>
        <Section>
          <IField label="Учень" value={sId} onChange={setSId} options={students.map(s=>({v:s.id,l:s.name}))}/>
          <IField label="Сума (₴)" type="number" value={amt} onChange={setAmt} placeholder="500"/>
          <IField label="Дата" type="date" value={date} onChange={setDate}/>
          <IField label="Примітка" value={note} onChange={setNote} placeholder="За 2 уроки"/>
        </Section>
        <div style={{padding:"0 16px"}}>
          <IBtn full v="tinted" color={iOS.green} onClick={()=>{if(!amt)return;onAddPayment({id:uid(),studentId:sId,amount:Number(amt),date,note});setPaySheet(false);}}>Додати оплату</IBtn>
        </div>
      </Sheet>
    );
  };

  const EditSheet=({payment})=>{
    const[sId,setSId]=useState(payment.studentId);
    const[amt,setAmt]=useState(String(payment.amount));
    const[date,setDate]=useState(payment.date);
    const[note,setNote]=useState(payment.note||"");
    return(
      <Sheet title="Редагувати оплату" onClose={()=>setEditSheet(null)}>
        <Section>
          <IField label="Учень" value={sId} onChange={setSId} options={students.map(s=>({v:s.id,l:s.name}))}/>
          <IField label="Сума (₴)" type="number" value={amt} onChange={setAmt} placeholder="500"/>
          <IField label="Дата" type="date" value={date} onChange={setDate}/>
          <IField label="Примітка" value={note} onChange={setNote} placeholder="За 2 уроки"/>
        </Section>
        <div style={{padding:"0 16px",display:"flex",flexDirection:"column",gap:10}}>
          <IBtn full v="tinted" color={iOS.blue} onClick={()=>{if(!amt)return;onUpdatePayment({...payment,studentId:sId,amount:Number(amt),date,note});setEditSheet(null);}}>Зберегти</IBtn>
          <IBtn full v="destructive" onClick={()=>{onDeletePayment(payment.id);setEditSheet(null);}}>Видалити платіж</IBtn>
        </div>
      </Sheet>
    );
  };

  return(
    <div>
      <div style={{padding:"60px 20px 4px",display:"flex",justifyContent:"space-between",alignItems:"flex-end"}}>
        <h1 style={{fontSize:34,fontWeight:800,color:iOS.label,letterSpacing:"-0.8px"}}>Фінанси</h1>
        <button onClick={()=>setPaySheet(true)} style={{background:iOS.greenT,color:iOS.green,border:"none",borderRadius:20,padding:"7px 16px",fontSize:15,fontWeight:600,cursor:"pointer"}}>+ Оплата</button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",margin:"12px 16px",background:"#fff",borderRadius:16,padding:"12px 16px"}}>
        <button onClick={()=>chM(-1)} style={{background:iOS.fill3,border:"none",width:32,height:32,borderRadius:8,cursor:"pointer",color:iOS.blue,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>‹</button>
        <span style={{fontSize:17,fontWeight:700,color:iOS.label,letterSpacing:"-0.3px"}}>{MONTHS[vm2-1]} {vy}</span>
        <button onClick={()=>chM(1)} style={{background:iOS.fill3,border:"none",width:32,height:32,borderRadius:8,cursor:"pointer",color:iOS.blue,fontSize:18,display:"flex",alignItems:"center",justifyContent:"center"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,margin:"0 16px 8px"}}>
        {[{l:"Планово",v:planned,c:iOS.blue},{l:"Зароблено",v:actual,c:iOS.green},{l:"Отримано",v:received,c:iOS.orange},{l:"Різниця",v:received-actual,c:received>=actual?iOS.green:iOS.red}].map(x=>(
          <div key={x.l} className="card" style={{padding:14}}>
            <p style={{fontSize:11,color:iOS.label3,marginBottom:6,textTransform:"uppercase",letterSpacing:"0.04em"}}>{x.l}</p>
            <p style={{fontSize:20,fontWeight:800,color:x.c,letterSpacing:"-0.5px"}}>{fmtM(x.v)}</p>
          </div>
        ))}
      </div>
      {perSt.length>0&&(
        <Section title="По учнях">
          {perSt.map((x,i)=>(
            <div key={x.s.id} style={{padding:"12px 16px",borderBottom:i<perSt.length-1?`0.5px solid ${iOS.sepNT}`:"none"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                <span style={{fontSize:15,fontWeight:600,color:iOS.label}}>{x.s.name}</span>
                <span style={{fontSize:15,fontWeight:700,color:iOS.green}}>{fmtM(x.earned)}</span>
              </div>
              <div style={{height:4,background:iOS.fill3,borderRadius:4,overflow:"hidden",marginBottom:6}}>
                <div style={{height:"100%",width:`${x.total>0?Math.min(100,Math.round(x.done/x.total*100)):0}%`,background:iOS.green,borderRadius:4}}/>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:12,color:iOS.label3}}>{x.done}/{x.total} занять</span>
                <span style={{fontSize:12,color:iOS.orange,fontWeight:600}}>За місяць: {fmtM(x.paid)}</span>
                {/* Загальний залишок по всій історії */}
                {Math.abs(x.overallBalance)>1&&(
                  <span style={{
                    fontSize:12,fontWeight:700,
                    color:x.overallBalance>0?iOS.green:iOS.red,
                    background:x.overallBalance>0?iOS.greenT:iOS.redT,
                    padding:"2px 8px",borderRadius:6,
                  }}>
                    {x.overallBalance>0?`↑ Аванс: ${fmtM(x.overallBalance)}`:`↓ Борг: ${fmtM(Math.abs(x.overallBalance))}`}
                  </span>
                )}
              </div>
            </div>
          ))}
        </Section>
      )}
      {/* Перехідний залишок — учні що не в цьому місяці але мають аванс/борг */}
      {carryover.length>0&&(
        <Section title="Перехідний залишок">
          {carryover.map((x,i)=>(
            <div key={x.s.id} style={{
              display:"flex",justifyContent:"space-between",alignItems:"center",
              padding:"12px 16px",
              borderBottom:i<carryover.length-1?`0.5px solid ${iOS.sepNT}`:"none",
            }}>
              <span style={{fontSize:15,color:iOS.label,fontWeight:500}}>{x.s.name}</span>
              <span style={{
                fontSize:14,fontWeight:700,
                color:x.overallBalance>0?iOS.green:iOS.red,
                background:x.overallBalance>0?iOS.greenT:iOS.redT,
                padding:"3px 10px",borderRadius:8,
              }}>
                {x.overallBalance>0?`↑ Аванс ${fmtM(x.overallBalance)}`:`↓ Борг ${fmtM(Math.abs(x.overallBalance))}`}
              </span>
            </div>
          ))}
        </Section>
      )}

      <Section title="Платежі" footer="Натисніть на платіж щоб редагувати або видалити">
        {moP.length===0&&<div style={{padding:"14px 16px",color:iOS.label3,fontSize:14}}>Платежів немає</div>}
        {[...moP].reverse().map((p,i)=>{
          const st=getSt(p.studentId);
          return(
            <div key={p.id} onClick={()=>setEditSheet(p)} className="press" style={{display:"flex",alignItems:"center",gap:12,padding:"13px 16px",borderBottom:i<moP.length-1?`0.5px solid ${iOS.sepNT}`:"none",cursor:"pointer"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:16,color:iOS.label,fontWeight:500}}>{st?.name||"?"}</div>
                <div style={{fontSize:13,color:iOS.label3,marginTop:2}}>{fmtD(p.date)}{p.note?` · ${p.note}`:""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:15,fontWeight:700,color:iOS.green}}>+{fmtM(p.amount)}</span>
                <span style={{color:iOS.label3,fontSize:18}}>›</span>
              </div>
            </div>
          );
        })}
      </Section>
      <div style={{height:20}}/>
      {paySheet&&<PaySheet/>}
      {editSheet&&<EditSheet payment={editSheet}/>}
    </div>
  );
};

            <IBtn sm v="tinted" onClick={()=>{onSaveTeacherChatId(tcId);show("✓ Збережено!");}}>Зберегти</IBtn>
          </div>
          {teacherChatId&&<p style={{fontSize:12,color:iOS.green,marginTop:6,fontWeight:600}}>✓ ID: {teacherChatId}</p>}

      <Section title="Chat ID учнів">
        <div style={{padding:"14px 16px",borderBottom:`0.5px solid ${iOS.sepNT}`}}>
          <p style={{fontSize:13,color:iOS.label2,marginBottom:10,lineHeight:1.5}}>Учень пише /start на <strong>t.me/yulia_school_bot</strong> → натисніть «Оновити»</p>

          return(

              <div>
                <p style={{fontSize:15,fontWeight:600,color:iOS.label}}>{u.name}</p>
                <p style={{fontSize:12,color:iOS.label3}}>{u.username&&`@${u.username} · `}ID: {u.chatId}{already&&<span style={{color:iOS.green,fontWeight:600}}> · ✓ {already.name}</span>}</p>
              </div>
              {!already&&<IBtn sm v="tinted" color={iOS.teal} onClick={()=>setAssignSheet(u)}>Призначити</IBtn>}
            </div>
          );
        })}
      </Section>
      <Section title={`Нагадування на завтра · ${tmrwL.length}`}>
        {!tmrwL.length&&<div style={{padding:"14px 16px",fontSize:13,color:iOS.label3}}>Занять на завтра немає</div>}
        {tmrwL.map((l,i)=>{
          const st=students.find(s=>s.id===l.studentId);
          const txt=`🔔 <b>Нагадування</b>\n\nЗавтра о ${l.time} — урок з Юлією Лук'янчук.\n📚 Українська мова 🇺🇦`;
          return(
            <div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:i<tmrwL.length-1?`0.5px solid ${iOS.sepNT}`:"none"}}>
              <div>
                <p style={{fontSize:15,fontWeight:600,color:iOS.label}}>{st?.name} · {l.time}</p>
                {!st?.tgChatId&&<p style={{fontSize:12,color:iOS.orange,marginTop:2}}>⚠ Chat ID не вказано</p>}
              </div>
              <IBtn sm v="tinted" color={iOS.teal} disabled={!st?.tgChatId||busy} onClick={async()=>{setBusy(true);const r=await tgSend(st.tgChatId,txt);show(r.ok?"✓ Надіслано!":"❌ "+r.error);setBusy(false);}}>Надіслати</IBtn>
            </div>
          );
        })}
      </Section>
      <Section title="Персональне повідомлення">
        <IField label="Учень" value={sId} onChange={setSId} options={students.map(s=>({v:s.id,l:s.name+(s.tgChatId?"":" ⚠")}))}/>
        {!selSt?.tgChatId&&<div style={{padding:"0 16px 8px",fontSize:13,color:iOS.orange}}>⚠ Chat ID не вказано</div>}
        <IField value={msg} onChange={setMsg} rows={4} placeholder="Текст повідомлення..."/>
        <div style={{padding:"8px 16px 14px",display:"flex",gap:10,alignItems:"center"}}>
          <IBtn sm v="tinted" color={iOS.teal} disabled={!msg||!selSt?.tgChatId||busy} onClick={async()=>{setBusy(true);const r=await tgSend(selSt.tgChatId,msg);show(r.ok?"✓ Надіслано!":"❌ "+r.error);if(r.ok)setMsg("");setBusy(false);}}>Надіслати ✈️</IBtn>
          {tgSt&&tgSt!=="✓ Збережено!"&&<span style={{fontSize:13,color:tgSt.startsWith("❌")?iOS.red:iOS.green,fontWeight:600}}>{tgSt}</span>}
        </div>
      </Section>
      <div style={{height:20}}/>
      {assignSheet&&(
        <Sheet title="Призначити учню" onClose={()=>setAssignSheet(null)}>
          <Section footer="Або це ваш Chat ID?">
            {students.filter(s=>!s.tgChatId).length===0&&<div style={{padding:"14px 16px",color:iOS.label3,fontSize:14}}>Всі учні мають Chat ID</div>}
            {students.filter(s=>!s.tgChatId).map((s,i,arr)=>(
              <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 16px",borderBottom:i<arr.length-1?`0.5px solid ${iOS.sepNT}`:"none"}}>
                <div><p style={{fontSize:15,fontWeight:600,color:iOS.label}}>{s.name}</p><p style={{fontSize:12,color:iOS.label3}}>{s.phone}</p></div>
                <IBtn sm onClick={()=>{onUpdateStudent({...s,tgChatId:assignSheet.chatId});setAssignSheet(null);}}>Призначити</IBtn>
              </div>
            ))}
          </Section>
          <div style={{padding:"0 16px"}}>
            <IBtn full v="gray" onClick={()=>{onSaveTeacherChatId(assignSheet.chatId);setTcId(assignSheet.chatId);setAssignSheet(null);show("✓ Збережено!");}}>Це мій Chat ID (вчитель)</IBtn>
          </div>
        </Sheet>
      )}
    </div>
  );
};

const Register=({onAdd,isPublic})=>{
  const[f,setF]=useState({name:"",phone:"",time:"",notes:""});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const[done,setDone]=useState(false);
  const[saving,setSaving]=useState(false);

  const handleSubmit=async()=>{
    if(!f.name||!f.phone||saving)return;
    setSaving(true);
    try{
      await onAdd({...f,id:uid(),date:today(),status:"new"});
      setDone(true);
      setF({name:"",phone:"",time:"",notes:""});
    }catch(e){console.error(e);}
    setSaving(false);

  if(done)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#000",padding:24}}>

        <p style={{color:"rgba(255,255,255,0.5)",fontSize:15,lineHeight:1.7}}>Юлія Лук'янчук зв'яжеться з вами найближчим часом.</p>
        {!isPublic&&<div style={{marginTop:24}}><IBtn onClick={()=>setDone(false)}>Нова заявка</IBtn></div>}
      </div>
    </div>
  );

  if(isPublic)return(
    <div style={{minHeight:"100vh",background:"#000",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{width:"100%",maxWidth:420}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:76,height:76,borderRadius:24,background:"rgba(255,255,255,0.1)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.15)",display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16}}>
            <span style={{color:"#fff",fontWeight:800,fontSize:24}}>ЮЛ</span>
          </div>

          <p style={{color:"rgba(255,255,255,0.4)",fontSize:14,lineHeight:1.6}}>Українська мова · Підготовка до НМТ, ДПА 🇺🇦</p>
        </div>
        <div style={{background:"rgba(255,255,255,0.07)",backdropFilter:"blur(30px)",borderRadius:24,border:"1px solid rgba(255,255,255,0.1)",overflow:"hidden",marginBottom:12}}>
          {[{l:"Ваше ім'я *",k:"name",ph:"Іванченко Олена Іванівна"},{l:"Телефон *",k:"phone",ph:"+38 050 000 00 00"},{l:"Зручний час",k:"time",ph:"Вечір будніх, субота..."},{l:"Клас / ціль навчання",k:"notes",ph:"10 клас, НМТ...",rows:2}].map((field,i,arr)=>(
            <div key={field.k} style={{padding:"14px 18px",borderBottom:i<arr.length-1?"0.5px solid rgba(255,255,255,0.08)":"none"}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.35)",marginBottom:5}}>{field.l}</div>
              {field.rows
                ?<textarea value={f[field.k]} onChange={e=>set(field.k,e.target.value)} rows={field.rows} placeholder={field.ph} style={{width:"100%",background:"transparent",border:"none",fontSize:16,color:"#fff",resize:"none"}}/>
                :<input value={f[field.k]} onChange={e=>set(field.k,e.target.value)} placeholder={field.ph} style={{width:"100%",background:"transparent",border:"none",fontSize:16,color:"#fff"}}/>
              }
            </div>
          ))}

        <p style={{fontSize:13,color:"rgba(255,255,255,0.3)",marginBottom:16,textAlign:"center",lineHeight:1.5}}>Пробний урок — безкоштовно!</p>

          {saving?"Зберігаємо...":"Записатися на пробний урок →"}
        </button>
        <p style={{textAlign:"center",fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:20}}>© Школа Юлії Лук'янчук</p>

  );

  return(
    <div>
      <div style={{padding:"60px 20px 12px"}}>

        <IField label="Зручний час" value={f.time} onChange={v=>set("time",v)} placeholder="Вечір будніх, субота..."/>
        <IField label="Клас / ціль" value={f.notes} onChange={v=>set("notes",v)} rows={3} placeholder="10 клас, НМТ..."/>

};

// ── APP ───────────────────────────────────────────────────
const NAV=[
  {id:"home",emoji:"🏠",l:"Головна"},
  {id:"cabinet",emoji:"📅",l:"Кабінет"},
  {id:"students",emoji:"👥",l:"Учні"},
  {id:"finance",emoji:"₴",l:"Фінанси"},
  {id:"telegram",emoji:"✈️",l:"Telegram"},
  {id:"register",emoji:"📝",l:"Запис"},
];

function App(){
  const[page,setPage]=useState("home");
  const[data,setData]=useState(null);
  const[loading,setLoading]=useState(true);
  const[authed,setAuthed]=useState(()=>sessionStorage.getItem("auth")==="1");
  const isPublic=window.location.hash==="#register"||window.location.search.includes("register");

  // ── Firebase: лише один слухач, без fbLoad ──
  // Використовуємо тільки fbListen щоб уникнути race condition
  useEffect(()=>{
    let initialized=false;
    const unsub=fbListen(d=>{
      // Перевірка що дані не порожні (захист від випадкового очищення)
      const hasData=d&&(
        (Array.isArray(d.students)&&d.students.length>0)||
        (Array.isArray(d.lessons)&&d.lessons.length>0)||
        (Array.isArray(d.payments)&&d.payments.length>0)||
        (Array.isArray(d.requests)&&d.requests.length>0)
      );
      setData(prev=>{
        // Якщо у нас вже є дані і нові порожні — НЕ оновлюємо (захист від очищення)
        if(prev&&hasData===false&&initialized){
          console.warn("fbListen: received empty data, keeping previous");
          return prev;
        }
        return{
          students:Array.isArray(d.students)?d.students:[],
          lessons: Array.isArray(d.lessons) ?d.lessons :[],
          payments:Array.isArray(d.payments)?d.payments:[],
          requests:Array.isArray(d.requests)?d.requests:[],
          teacherChatId:d.teacherChatId||"",
        };
      });
      setLoading(false);
      initialized=true;
    });

    // Якщо через 5 секунд даних немає — документ не існує, створюємо порожній
    const timer=setTimeout(async()=>{
      if(!initialized){
        const existing=await fbLoad();
        if(!existing){
          const empty=EMPTY();
          await fbSave(empty);
          setData(empty);
        }
        setLoading(false);
        initialized=true;
      }
    },5000);

    return()=>{unsub();clearTimeout(timer);};
  },[]);

  // ── Зберегти в Firebase (setData одразу для UI, потім Firebase) ──
  const save=useCallback((nd)=>{
    // Захист: не зберігаємо якщо nd пустий або не об'єкт
    if(!nd||typeof nd!=='object')return;
    const safe={
      students:Array.isArray(nd.students)?nd.students:[],
      lessons: Array.isArray(nd.lessons) ?nd.lessons :[],
      payments:Array.isArray(nd.payments)?nd.payments:[],
      requests:Array.isArray(nd.requests)?nd.requests:[],
      teacherChatId:nd.teacherChatId||"",
    };
    setData(safe);
    fbSave(safe);
  },[]);

  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"#F2F2F7",gap:16}}>
      <div style={{width:50,height:50,borderRadius:16,background:"linear-gradient(135deg,#007AFF,#0055D4)",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{color:"#fff",fontWeight:800,fontSize:16}}>ЮЛ</span>
      </div>
      <p style={{color:"rgba(60,60,67,0.4)",fontSize:14}}>Завантаження...</p>
    </div>
  );

  // ── Публічна сторінка запису ──
  if(isPublic){
    const go=async r=>{
      try{
        // Читаємо СВІЖІ дані з Firebase щоб не затерти існуючі
        const current=await fbLoad()||EMPTY();
        const safe={
          students:Array.isArray(current.students)?current.students:[],
          lessons: Array.isArray(current.lessons) ?current.lessons :[],
          payments:Array.isArray(current.payments)?current.payments:[],
          requests:[...(Array.isArray(current.requests)?current.requests:[]),r],
          teacherChatId:current.teacherChatId||"",
        };
        const ok=await fbSave(safe);
        if(ok&&current.teacherChatId){
          await tgSend(current.teacherChatId,`📬 <b>Нова заявка на пробний урок!</b>\n\n👤 ${r.name}\n📞 ${r.phone}${r.time?`\n⏰ ${r.time}`:""}${r.notes?`\n📝 ${r.notes}`:""}\n\n⏰ ${new Date().toLocaleString("uk-UA")}`);
        }
      }catch(e){console.error("Register save error:",e);}
    };
    return<Register isPublic onAdd={go}/>;
  }

  if(!authed)return<LoginScreen onLogin={()=>setAuthed(true)}/>;

  if(!data)return<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh"}}>Помилка завантаження</div>;

  const{students=[],lessons=[],payments=[],requests=[],teacherChatId=""}=data;

  const fromReq=r=>{
    const ns={id:uid(),name:r.name,phone:r.phone,lessonCost:500,balance:0,notes:r.notes||"",tgChatId:"",status:"active"};
    save({lessons,payments,teacherChatId,students:[...students,ns],requests:requests.map(x=>x.id===r.id?{...r,status:"converted"}:x)});
  };
  const addReq=async r=>{
    save({students,lessons,payments,teacherChatId,requests:[...requests,r]});
    if(teacherChatId)await tgSend(teacherChatId,`📬 <b>Нова заявка!</b>\n\n👤 ${r.name}\n📞 ${r.phone}${r.time?`\n⏰ ${r.time}`:""}${r.notes?`\n📝 ${r.notes}`:""}`);
  };

  const newReqCount=requests.filter(r=>r.status==="new").length;

  const pages={
    home:<Home students={students} lessons={lessons} payments={payments} onLogout={()=>{sessionStorage.removeItem("auth");setAuthed(false);}}/>,
    cabinet:<Cabinet students={students} lessons={lessons} payments={payments}
      onGoToStudent={id=>{setPage("students");setTimeout(()=>window.__goToStudent&&window.__goToStudent(id),50);}}
      onAdd={l=>{
        const newLessons=[...lessons,l];
        const recalced=recalcPaid(l.studentId,newLessons,payments,students);
        save({students,payments,requests,teacherChatId,lessons:recalced});
      }}
      onUpdate={l=>{
        const newLessons=lessons.map(x=>x.id===l.id?l:x);
        const recalced=recalcPaid(l.studentId,newLessons,payments,students);
        save({students,payments,requests,teacherChatId,lessons:recalced});
      }}
      onDelete={id=>save({students,payments,requests,teacherChatId,lessons:lessons.filter(x=>x.id!==id)})}
      onCancel={id=>{
        const lesson=lessons.find(l=>l.id===id);
        if(!lesson)return;
        const cancelled=lessons.map(l=>l.id===id?{...l,status:"cancelled",paid:false}:l);
        const recalced=recalcPaid(lesson.studentId,cancelled,payments,students);
        save({students,payments,requests,teacherChatId,lessons:recalced});
      }}/>,
    students:<Students students={students} lessons={lessons} requests={requests}
      onAdd={s=>save({lessons,payments,requests,teacherChatId,students:[...students,s]})}
      onAddMany={newL=>{
        const merged=[...lessons,...newL];
        // Перераховуємо оплату для всіх учнів яким додали уроки
        const affectedIds=[...new Set(newL.map(l=>l.studentId))];
        let recalced=merged;
        affectedIds.forEach(sid=>{recalced=recalcPaid(sid,recalced,payments,students);});
        save({students,payments,requests,teacherChatId,lessons:recalced});
      }}
      onUpdate={s=>save({lessons,payments,requests,teacherChatId,students:students.map(x=>x.id===s.id?s:x)})}
      onDelete={id=>save({lessons,payments,requests,teacherChatId,students:students.filter(x=>x.id!==id)})}
      onUpdateRequest={r=>save({students,lessons,payments,teacherChatId,requests:requests.map(x=>x.id===r.id?r:x)})}
      onAddFromRequest={fromReq}/>,
    finance:<Finance students={students} lessons={lessons} payments={payments}
      onAddPayment={p=>{
        const nP=[...payments,p];
        const nS=students.map(s=>s.id===p.studentId?{...s,balance:s.balance+p.amount}:s);
        const recalced=recalcPaid(p.studentId,lessons,nP,nS);
        save({requests,teacherChatId,payments:nP,students:nS,lessons:recalced});
      }}
      onUpdatePayment={p=>{
        const oldP=payments.find(x=>x.id===p.id);
        const diff=p.amount-(oldP?.amount||0);
        const nP=payments.map(x=>x.id===p.id?p:x);
        const nS=students.map(s=>s.id===p.studentId?{...s,balance:s.balance+diff}:s);
        const recalced=recalcPaid(p.studentId,lessons,nP,nS);
        save({requests,teacherChatId,payments:nP,students:nS,lessons:recalced});
      }}
      onDeletePayment={id=>{
        const p=payments.find(x=>x.id===id);
        const nP=payments.filter(x=>x.id!==id);
        const nS=students.map(s=>s.id===p?.studentId?{...s,balance:s.balance-p.amount}:s);
        const recalced=recalcPaid(p?.studentId,lessons,nP,nS);
        save({requests,teacherChatId,payments:nP,students:nS,lessons:recalced});
      }}/>,
    telegram:<Telegram students={students} lessons={lessons} teacherChatId={teacherChatId}
      onSaveTeacherChatId={id=>save({students,lessons,payments,requests,teacherChatId:id})}
      onUpdateStudent={s=>save({lessons,payments,requests,teacherChatId,students:students.map(x=>x.id===s.id?s:x)})}/>,
    register:<Register onAdd={addReq}/>,
  };

  return(
    <div style={{maxWidth:540,margin:"0 auto",minHeight:"100vh",background:iOS.bg,position:"relative"}}>
      <div style={{overflowY:"auto",paddingBottom:110}}>{pages[page]}</div>

      {/* iOS Floating Tab Bar */}
      <div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",width:"calc(100% - 32px)",maxWidth:508,background:"rgba(255,255,255,0.72)",backdropFilter:"blur(30px) saturate(200%)",WebkitBackdropFilter:"blur(30px) saturate(200%)",borderRadius:28,border:"0.5px solid rgba(255,255,255,0.8)",boxShadow:"0 8px 40px rgba(0,0,0,0.12)",display:"flex",padding:"6px 8px",zIndex:100}}>
        {NAV.map(n=>{
          const active=page===n.id;
          const hasBadge=n.id==="students"&&newReqCount>0;
          return(
            <button key={n.id} onClick={()=>setPage(n.id)} style={{flex:1,padding:"8px 4px 6px",background:active?"rgba(0,122,255,0.1)":"transparent",border:"none",borderRadius:20,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative",transition:"background 0.15s",minWidth:0}}>
              {hasBadge&&<div style={{position:"absolute",top:5,right:"20%",width:8,height:8,borderRadius:"50%",background:iOS.red,border:"1.5px solid rgba(255,255,255,0.8)"}}/>}
              <span style={{fontSize:18,lineHeight:1,opacity:active?1:0.6}}>{n.emoji}</span>
              <span style={{fontSize:9,fontWeight:active?700:500,color:active?iOS.blue:iOS.label2,letterSpacing:"0.02em",whiteSpace:"nowrap"}}>{n.l}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
